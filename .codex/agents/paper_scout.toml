# 只读研究助手：用于查资料、读结构、找实验入口。

# 子代理名称。
# 作用：在 Codex 中标识这个子代理。
# 可选项：任意简短字符串，建议与职责一致。
# 推荐值：名称要直接体现“研究/侦察/只读”职责。
# 风险提示：名称模糊时，容易被误当成可执行或可修改代码的代理。
name = "paper_scout"

# 子代理说明。
# 作用：概括这个子代理的职责，便于调度与识别。
# 可选项：自由文本字符串。
# 推荐值：描述中明确写出“只读”“梳理结构”“确认入口”。
# 风险提示：如果描述不强调只读，后续可能与执行代理职责重叠。
description = "只读研究助手，用于查资料、梳理代码结构、确认实验入口。"

# 子代理默认模型。
# 作用：指定该子代理执行任务时优先使用的模型。
# 可选项：填写当前 Codex 客户端支持的模型名。
# 推荐值：探索与分析代理宜使用较强模型，减少误判结构和入口的概率。
# 风险提示：模型能力不足时，更容易给出看似合理但证据不足的路径结论。
model = "gpt-5.4"

# 子代理默认推理强度。
# 作用：控制该子代理处理任务时的思考深度。
# 常见可选项：low、medium、high、xhigh；实际支持集合以当前客户端版本为准。
# 推荐值：high。
# 风险提示：太低会降低代码结构梳理和文献/入口交叉验证的质量。
model_reasoning_effort = "high"

# 子代理审批策略。
# 作用：决定这个子代理执行命令时是否会请求人工确认。
# 可选项：untrusted、on-failure、on-request、never
# 推荐值：只读代理即使设 never，风险也相对可控，因为它不应改文件。
# 风险提示：never 仍可能让其主动读取更多内容或执行只读命令；如果仓库含敏感信息，仍要谨慎。
approval_policy = "never"

# 子代理文件系统权限。
# 作用：控制该子代理的默认读写范围。
# 可选项：read-only、workspace-write、danger-full-access
# 推荐值：read-only。
# 风险提示：如果把侦察代理也放到可写模式，职责边界会被破坏，后续更难判断是谁改了什么。
sandbox_mode = "read-only"

# 子代理附加说明。
# 作用：用多行字符串给该代理补充工作约束与执行规范。
# 可选项：任意多行字符串；建议写清输入、输出、边界和禁区。
# 推荐值：强调“先给证据和路径，再给建议；不要改文件”。
# 风险提示：研究代理如果不强调证据优先，容易产出结论先行、依据不足的建议。
developer_instructions = """
保持只读。
优先定位现有实验入口、关键参数、数据来源和导出路径。
先给证据和路径，再给建议。
不要改文件。
"""
