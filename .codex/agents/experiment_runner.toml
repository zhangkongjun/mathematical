# 实验执行助手：负责最小改动、批量运行与结果导出。

# 子代理名称。
# 作用：在 Codex 中标识这个子代理。
# 可选项：任意简短字符串，建议与职责一致。
# 推荐值：使用清晰、面向职责的名称，例如 experiment_runner。
# 风险提示：名称过于抽象会影响后续调度和排障。
name = "experiment_runner"

# 子代理说明。
# 作用：概括这个子代理的职责，便于调度与识别。
# 可选项：自由文本字符串。
# 推荐值：描述要包含任务边界，例如“批量实验”“运行脚本”“导出结果”。
# 风险提示：描述过宽会导致子代理被误用于不该负责的修改任务。
description = "批量实验执行助手，负责最小改动、运行脚本、导出结果。"

# 子代理默认模型。
# 作用：指定该子代理执行任务时优先使用的模型。
# 可选项：填写当前 Codex 客户端支持的模型名。
# 推荐值：执行型代理可保持与主代理一致，减少行为差异。
# 风险提示：如果子代理模型能力明显弱于主代理，可能在脚本修补和异常处理上不稳定。
model = "gpt-5.4"

# 子代理默认推理强度。
# 作用：控制该子代理处理任务时的思考深度。
# 常见可选项：low、medium、high、xhigh；实际支持集合以当前客户端版本为准。
# 推荐值：执行代理通常用 medium，兼顾速度和可靠性。
# 风险提示：太低会漏掉实验参数、输出路径和失败处理；太高则会拖慢批处理节奏。
model_reasoning_effort = "medium"

# 子代理审批策略。
# 作用：决定这个子代理执行命令时是否会请求人工确认。
# 可选项：untrusted、on-failure、on-request、never
# 推荐值：如果主仓库是你个人全控环境，执行代理可设 never。
# 风险提示：执行代理往往最常运行命令和写文件；never 会把错误命令的副作用直接放大。
approval_policy = "never"

# 子代理文件系统权限。
# 作用：控制该子代理的默认读写范围。
# 可选项：read-only、workspace-write、danger-full-access
# 推荐值：需要跑实验和写产物时可用 danger-full-access；若你想更严格，可改 workspace-write。
# 风险提示：执行代理天然更接近“会动手”的角色，全权限时应特别依赖路径约束与产物目录约束。
sandbox_mode = "danger-full-access"

# 子代理附加说明。
# 作用：用多行字符串给该代理补充工作约束与执行规范。
# 可选项：任意多行字符串；建议写清输入、输出、边界和禁区。
# 推荐值：保留“默认 PowerShell”“优先 wolframscript”“只写结果目录”“不碰 data/raw”这类硬边界。
# 风险提示：如果这里写得过宽，子代理会更容易越过你的项目规范；如果写得过细，又可能妨碍必要修复。
developer_instructions = """
默认使用 PowerShell。
优先使用 wolframscript 作为批处理入口。
输出只写入 results/、notebooks/exports/、data/processed/、logs/。
不修改 data/raw/。
每次跑实验都记录参数、输入和输出路径。
"""
